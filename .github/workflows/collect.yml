name: Auto Collect

on:
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 6:00 (北京 14:00)
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser trafilatura markdownify justext beautifulsoup4 gdelt pandas

      - name: Install yt-dlp
        run: |
          mkdir -p ~/bin
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/bin/yt-dlp
          chmod +x ~/bin/yt-dlp

      - name: Run RSS feeds
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/rss_feeds.py both

      - name: Run GDELT feed
        run: python scripts/gdelt_feed.py 2

      - name: Tag criticality (BLUF)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/tag_criticality.py

      - name: Generate AI briefing
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/briefing.py

      - name: Multi-source corroboration clustering
        run: python scripts/cluster_corroboration.py

      - name: Snapshot to archive (time-series)
        run: python scripts/snapshot.py

      - name: I&W indicators (event frequency / critical / escalation anomalies)
        run: python scripts/indicators.py

      - name: Pipeline health report (+ orphan auto-fix)
        run: python scripts/health_report.py --fix

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            git commit -m "auto: 每日数据更新 $(date -u +%Y-%m-%d)

          $CHANGES"
            # Retry up to 3 times: rebase on remote then push
            pushed=0
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=1
                break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            if [ $pushed -eq 0 ]; then
              echo "ERROR: All push attempts failed"
              exit 1
            fi
          else
            echo "No changes to commit"
          fi
