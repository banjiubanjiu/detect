name: Auto Translate

on:
  schedule:
    - cron: '30 */4 * * *'  # 每 4 小时一次 (00:30, 04:30, 08:30, 12:30, 16:30, 20:30 UTC)
  workflow_dispatch:        # 手动触发
    inputs:
      limit:
        description: '本次翻译篇数 (默认 30, 0=不限)'
        required: false
        default: '30'

permissions:
  contents: write

concurrency:
  group: translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run translate batch
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/translate_pending.py ${{ github.event.inputs.limit || '30' }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            git commit -m "auto: 翻译批次 $(date -u +%Y-%m-%d-%H%M)

          $CHANGES"
            pushed=0
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=1
                break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            if [ $pushed -eq 0 ]; then
              echo "ERROR: All push attempts failed"
              exit 1
            fi
          else
            echo "No new translations to commit"
          fi
