<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战况追踪 · LIVE WATCH — 战情指挥中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="command.css">
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
</head>
<body>

  <!-- News Ticker: critical 事件横向滚动条 (组合 A4, 在顶栏之上) -->
  <div class="cc-ticker" id="ccTicker" style="display:none">
    <span class="cct-label">● CRITICAL</span>
    <div class="cct-track" id="ccTickerTrack"></div>
  </div>

  <!-- ① 顶栏 -->
  <header class="cc-topbar" id="topbar">
    <div class="tb-left">
      <span class="tb-brand">战况追踪</span>
      <span class="tb-mode">
        <span class="tb-mode-dot"></span>
        LIVE WATCH
      </span>
    </div>
    <div class="tb-center">
      <span class="tb-clock" id="tbClock">--:--:-- UTC</span>
    </div>
    <div class="tb-right">
      <span class="tb-events">
        <span class="tb-num" id="tbEvents">—</span>
        <span class="tb-unit">events / 30d</span>
      </span>
      <span class="tb-updated" id="tbUpdated">last update: —</span>
      <span class="tb-live" id="tbLive">● —</span>
      <a class="tb-switch tb-switch-analytics" href="analytics.html" title="分析工作台">ANALYTICS ↗</a>
      <a class="tb-switch" href="./" title="回到档案阅读模式">ARCHIVE ↗</a>
    </div>
  </header>

  <!-- ② 左栏: 冲突升级条 + infra 统计 -->
  <aside class="cc-left" id="leftRail">
    <div class="rail-head">CONFLICTS</div>
    <div class="rail-body" id="conflictRail"></div>
    <div class="rail-head">INFRASTRUCTURE</div>
    <div class="rail-infra" id="infraStats">
      <div class="infra-row"><span class="ir-k">BASES</span><span class="ir-v" id="irBases">—</span></div>
      <div class="infra-row"><span class="ir-k">NUKE PLT</span><span class="ir-v" id="irNuke">—</span></div>
      <div class="infra-row"><span class="ir-k">CHOKE</span><span class="ir-v" id="irChoke">—</span></div>
    </div>
  </aside>

  <!-- ③ 中间: 3D Globe + 弧线 -->
  <main class="cc-center" id="centerStage">
    <div class="globe-wrap" id="globeWrap"></div>
    <div class="globe-overlay-tl" id="arcStatus">
      <span class="ao-dot"></span>
      <span class="ao-text" id="arcCount">—</span>
    </div>

    <!-- 虚拟值班员: 数字人主播 (Wan2.2-S2V), idle 循环静音播放 -->
    <div class="cc-anchor" id="ccAnchor" style="display:none">
      <video class="cca-video" id="ccaVideo" muted playsinline loop autoplay preload="auto">
        <source id="ccaVideoSrc" type="video/mp4">
      </video>
      <div class="cca-meta">
        <div class="cca-label">
          <span class="cca-dot"></span>
          <span class="cca-label-text">BRIEFING ANCHOR</span>
        </div>
        <p class="cca-headline" id="ccaHeadline"></p>
        <div class="cca-foot">
          <span class="cca-date" id="ccaDate">—</span>
          <span class="cca-sound" id="ccaSound" title="点击切换静音">MUTE</span>
        </div>
      </div>
    </div>

    <div class="globe-overlay-br" id="globeCtrls">
      <button class="gc-btn gc-active" data-act="rotate" title="自转">◉ ROTATE</button>
      <button class="gc-btn" data-act="pause" title="暂停">⏸ PAUSE</button>
      <button class="gc-btn" data-act="reset" title="重置视角">⊙ RESET</button>
    </div>
  </main>

  <!-- ④ 右栏: Live feed -->
  <aside class="cc-right" id="rightRail">
    <div class="rail-head">
      <span>LIVE FEED</span>
      <span class="rh-sub" id="feedSub">—</span>
    </div>
    <div class="feed-body" id="feedBody"></div>
    <div class="feed-foot">
      <span class="ff-hint">hover 暂停 · 点击打开</span>
    </div>
  </aside>

  <!-- ⑤ 底栏: Goldstein 30d -->
  <footer class="cc-bottom" id="bottomBar">
    <div class="bb-left">
      <span class="bb-label">30-DAY GOLDSTEIN FLOOR</span>
      <span class="bb-hint">per-day min · darker = worse</span>
    </div>
    <div class="bb-chart" id="goldsteinChart"></div>
    <div class="bb-right" id="pipelineDots">
      <span class="pd-label">PIPELINE</span>
      <span class="pd-dot pd-ok" data-src="web" title="web"></span>
      <span class="pd-dot pd-ok" data-src="reddit" title="reddit"></span>
      <span class="pd-dot pd-ok" data-src="x" title="x"></span>
      <span class="pd-dot pd-ok" data-src="youtube" title="youtube"></span>
      <span class="pd-dot pd-ok" data-src="gdelt" title="gdelt"></span>
    </div>
  </footer>

  <script src="command.js"></script>
</body>
</html>
