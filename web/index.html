<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战况追踪 — 全球冲突态势</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="alternate" type="application/rss+xml" title="战况追踪 RSS" href="feed.xml">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.js"></script>
  <!-- Leaflet 插件: 热力图 + 聚类 -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
</head>
<body>

  <header class="masthead">
    <div class="mast-rule-top"></div>
    <div class="mast-inner">
      <div class="mast-left">
        <h1 class="mast-title">战况追踪</h1>
        <p class="mast-sub">Global Conflict Monitor</p>
      </div>
      <div class="mast-right">
        <a class="watch-link" href="command.html" title="战情指挥中心 · 实时监控模式"><span class="wl-dot"></span>WATCH</a>
        <span class="health-badge" id="healthBadge" title="管道健康" onclick="showHealthModal()" style="display:none"></span>
        <a class="rss-link" href="feed.xml" title="RSS 订阅" target="_blank">RSS</a>
        <span class="theme-toggle" id="themeToggle" title="切换暗色模式">DARK</span>
        <span class="lang-toggle" id="langToggle" onclick="toggleLang()">EN/中</span>
        <time class="mast-date" id="mastDate"></time>
      </div>
    </div>
    <div class="mast-rule-bot"></div>
  </header>

  <!-- News Ticker: critical 事件横向滚动条 (组合 A4) -->
  <div class="news-ticker" id="newsTicker" style="display:none">
    <span class="nt-label">● CRITICAL</span>
    <div class="nt-track" id="newsTickerTrack"></div>
  </div>

  <!-- Search -->
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索所有冲突的报道..." />
    <span class="search-count" id="searchCount"></span>
  </div>

  <!-- Region-grouped conflict selector -->
  <nav class="region-nav" id="regionNav"></nav>

  <!-- View toggle + time filter + export -->
  <div class="toolbar" id="toolbar">
    <div class="view-toggle" id="viewToggle">
      <span class="vt-btn vt-active" data-v="overview">总览</span>
      <span class="vt-btn" data-v="timeline">最新动态</span>
    </div>
    <div class="time-filter" id="timeFilter">
      <span class="tf-btn" data-t="1">24h</span>
      <span class="tf-btn" data-t="7">7d</span>
      <span class="tf-btn tf-active" data-t="30">30d</span>
      <span class="tf-btn" data-t="0">全部</span>
    </div>
    <div class="export-btns">
      <span class="export-btn" id="exportJson" title="导出 JSON">JSON</span>
      <span class="export-btn" id="exportCsv" title="导出 CSV">CSV</span>
    </div>
  </div>

  <!-- Globe -->
  <div class="globe-section" id="globeSection">
    <div class="globe-wrap" id="globeWrap"></div>
    <div class="globe-legend">
      <span class="gl-item"><span class="gl-dot war"></span>全面战争</span>
      <span class="gl-item"><span class="gl-dot conflict"></span>武装冲突</span>
      <span class="gl-item"><span class="gl-dot tension"></span>紧张对峙</span>
    </div>
  </div>

  <!-- Overview (default view) -->
  <section class="overview" id="overview"></section>

  <!-- Hot reports + Force graph row -->
  <section class="viz-row" id="vizRow">
    <div class="viz-panel">
      <h3 class="viz-heading">热门报道 <span class="viz-sub">TOP 10 by engagement</span></h3>
      <div class="hot-list" id="hotList"></div>
    </div>
    <div class="viz-panel">
      <h3 class="viz-heading">冲突关系图谱 <span class="viz-sub">force-directed graph</span></h3>
      <div class="force-wrap" id="forceWrap"></div>
    </div>
  </section>

  <!-- Time dimension row: streamgraph + sparkline wall (方向 C) -->
  <section class="viz-row viz-row-time" id="vizRowTime">
    <div class="viz-panel viz-stream-panel">
      <h3 class="viz-heading">30 天事件流 <span class="viz-sub">stacked by conflict · hover 查看 · click 跳详情</span></h3>
      <div class="stream-wrap" id="streamWrap"></div>
      <div class="stream-tooltip" id="streamTooltip" style="display:none"></div>
    </div>
    <div class="viz-panel viz-sparkwall-panel">
      <h3 class="viz-heading">9 冲突节奏 <span class="viz-sub">sparkline wall</span></h3>
      <div class="sparkwall" id="sparkWall"></div>
    </div>
  </section>

  <!-- Global timeline view -->
  <section class="timeline" id="timeline" style="display:none"></section>

  <!-- Conflict detail view (hidden by default) -->
  <section class="conflict-detail" id="conflictDetail" style="display:none">
    <div class="cd-back" id="cdBack">&larr; 返回总览</div>
    <div class="cd-header">
      <div class="cd-left">
        <h2 class="cd-name" id="cdName"></h2>
        <div class="cd-meta" id="cdMeta"></div>
      </div>
      <div class="cd-right" id="cdRight"></div>
    </div>
    <div class="cd-map" id="cdMap"></div>
    <div class="map-controls" id="mapControls" style="display:none">
      <div class="replay-bar" id="replayBar">
        <button class="replay-btn" id="replayBtn" title="播放冲突时间线">▶ 回放</button>
        <input type="range" class="replay-slider" id="replaySlider" min="0" max="100" value="0">
        <span class="replay-date" id="replayDate"></span>
        <span class="replay-count" id="replayCount"></span>
      </div>
      <div class="layer-toggles" id="layerToggles">
        <span class="layer-label">图层</span>
        <label class="layer-toggle" id="layerFrontlineWrap" style="display:none"><input type="checkbox" id="layerFrontline" value="frontline" checked> 前线</label>
        <label class="layer-toggle"><input type="checkbox" id="layerHeat" value="heat"> 热力</label>
        <label class="layer-toggle"><input type="checkbox" id="layerCluster" value="cluster" checked> 聚类</label>
        <span class="layer-sep"></span>
        <label class="layer-toggle"><input type="checkbox" id="layerBases" value="bases"> 军事基地</label>
        <label class="layer-toggle"><input type="checkbox" id="layerNuclear" value="nuclear"> 核设施</label>
        <label class="layer-toggle"><input type="checkbox" id="layerPipelines" value="pipelines"> 管道/电缆</label>
      </div>
    </div>
    <p class="cd-summary" id="cdSummary"></p>
    <div class="data-strip" id="dataStrip"></div>
    <nav class="cat-tabs" id="catTabs"></nav>
    <div class="river" id="river"></div>
  </section>

  <!-- Article reading view -->
  <div class="reader-progress" id="readerProgress"></div>
  <section class="reader" id="reader" style="display:none">
    <div class="reader-inner">
      <div class="reader-nav">
        <span class="reader-back" id="readerBack">&larr; 返回列表</span>
        <span class="reader-tag" id="readerTag"></span>
      </div>
      <h1 class="reader-title" id="readerTitle"></h1>
      <div class="reader-meta" id="readerMeta"></div>
      <div class="reader-corrob" id="readerCorrob" style="display:none"></div>
      <div class="reader-actions reader-actions-top" id="readerActionsTop"></div>
      <div class="translate-bar" id="translateBar" style="display:none">
        <button class="translate-btn" id="translateBtn" onclick="translateArticle()">翻译全文</button>
        <span class="translate-status" id="translateStatus"></span>
      </div>
      <article class="reader-body" id="readerBody"></article>
      <div class="reader-actions reader-actions-bot" id="readerActionsBot"></div>
    </div>
  </section>

  <div class="kbd-hint" id="kbdHint">
    <kbd>J</kbd><kbd>K</kbd> 导航 &nbsp; <kbd>Enter</kbd> 打开 &nbsp; <kbd>Esc</kbd> 返回 &nbsp; <kbd>/</kbd> 搜索
  </div>

  <!-- Health modal — populated by app.js when healthBadge clicked -->
  <div class="health-modal-overlay" id="healthModal" style="display:none" onclick="if(event.target===this)closeHealthModal()">
    <div class="health-modal">
      <div class="health-modal-head">
        <h2>管道健康</h2>
        <button class="health-modal-close" onclick="closeHealthModal()">×</button>
      </div>
      <div class="health-modal-body" id="healthModalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
